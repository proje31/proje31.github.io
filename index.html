<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Video Project</title>

<style>

body{
margin:0;
background:#0b0b0b;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
font-family:Arial;
color:white;
}

.container{
display:flex;
align-items:center;
gap:60px;
}

.info{
font-size:18px;
line-height:35px;
}

video{
width:700px;
max-width:80vw;
border-radius:10px;
box-shadow:0 0 25px rgba(0,0,0,0.8);
}

.score-box{
margin-top:20px;
}

.score-input{
width:80px;
padding:10px;
font-size:18px;
text-align:center;
border:none;
border-radius:6px;
}

.score-btn{
background:red;
border:none;
padding:10px 20px;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
margin-left:10px;
}

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.popup{
font-size:120px;
font-weight:bold;
}

#thanksPopup{
color:#00ff2a;
}

#watchPopup{
color:#00ff2a;
}

#errorPopup{
color:red;
}

.fullscreen .info{
display:none;
}

</style>
</head>

<body>

<div class="container" id="mainContainer">

<div class="info">

<div>NAME : BURHAN</div>
<div>CLASS : 11-A</div>
<div>NUMBER : 963</div>
<div>TEACHERS NAME : MEHTAP</div>
<div>PROJECT TOPIC : JOBS OF THE FUTURE</div>

<div class="score-box">
<div>THE SCORE :</div>

<input id="scoreInput" class="score-input">

<button class="score-btn" onclick="saveScore()">SAVE</button>

</div>

</div>

<div>

<video id="videoPlayer" controls>
<source src="ing video.mp4" type="video/mp4">
</video>

</div>

</div>

<div id="overlay" class="overlay">
<div id="thanksPopup" class="popup">THANKS</div>
<div id="watchPopup" class="popup">THANKS FOR WATCHING</div>
<div id="errorPopup" class="popup">ERROR</div>
</div>

<script>

const video = document.getElementById("videoPlayer");
const container = document.getElementById("mainContainer");
const scoreInput = document.getElementById("scoreInput");

const overlay = document.getElementById("overlay");
const thanksPopup = document.getElementById("thanksPopup");
const watchPopup = document.getElementById("watchPopup");
const errorPopup = document.getElementById("errorPopup");

function showPopup(element,time=2000){

overlay.style.display="flex";

thanksPopup.style.display="none";
watchPopup.style.display="none";
errorPopup.style.display="none";

element.style.display="block";

setTimeout(()=>{
overlay.style.display="none";
element.style.display="none";
},time);

}

video.addEventListener("ended",function(){

video.currentTime=0;
video.pause();

showPopup(watchPopup);

});

document.addEventListener("fullscreenchange",function(){

if(document.fullscreenElement){
container.classList.add("fullscreen");
}else{
container.classList.remove("fullscreen");
}

});

function saveScore(){

let value=scoreInput.value;

if(value!=="100"){

showPopup(errorPopup,1200);

setTimeout(()=>{
location.reload();
},1200);

return;
}

localStorage.setItem("projectScore",value);

showPopup(thanksPopup);

}

window.onload=function(){

let saved=localStorage.getItem("projectScore");

if(saved){
scoreInput.value=saved;
}

}

</script>

</body>
</html>
